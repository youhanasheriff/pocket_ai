name: pocket_ai
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
      # Core vision inference
      - ultralytics>=8.3.0
      - opencv-python>=4.8.0
      - numpy>=1.23.0
      # ONNX runtime
      - onnx>=1.14.0
      - onnxruntime>=1.16.0
      # Image processing
      - Pillow>=9.4.0
      # Configuration
      - PyYAML>=6.0
      # Hardware detection
      - psutil>=5.9.0
      # TTS (Phase 1.4)
      - pyttsx3>=2.90
      - pyobjc>=9.0
      # Depth model download utility
      - huggingface_hub
